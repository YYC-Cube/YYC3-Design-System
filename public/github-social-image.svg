<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1a2e"/>

  <!-- Gradient Overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#grad1)"/>
  <rect width="1200" height="630" fill="url(#grad2)"/>

  <!-- Logo/Icon -->
  <circle cx="600" cy="280" r="80" fill="#667eea"/>
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="60" fill="white" text-anchor="middle" dominant-baseline="middle" font-weight="bold">Y</text>

  <!-- Title -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="48" fill="white" text-anchor="middle" font-weight="bold">YYC³ Design System</text>

  <!-- Subtitle -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="24" fill="#a0a0b0" text-anchor="middle">Five-High / Five-Standard / Five-Implementation</text>

  <!-- Tags -->
  <rect x="420" y="480" width="100" height="36" rx="18" fill="#667eea"/>
  <text x="470" y="504" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" dominant-baseline="middle">TypeScript</text>

  <rect x="540" y="480" width="100" height="36" rx="18" fill="#764ba2"/>
  <text x="590" y="504" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" dominant-baseline="middle">React</text>

  <rect x="660" y="480" width="100" height="36" rx="18" fill="#f5576c"/>
  <text x="710" y="504" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" dominant-baseline="middle">Open Source</text>

  <!-- Footer -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="18" fill="#808090" text-anchor="middle">Enterprise-grade Design System with 3 Switchable Themes</text>
</svg>
